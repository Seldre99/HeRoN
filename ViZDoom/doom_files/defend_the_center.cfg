# defend_the_center.cfg
doom_scenario_path = defend_the_center.wad
doom_skill = 1
# IMPORTANTE: L'episodio finisce SOLO quando muori, non dopo N kill
living_reward = 0
death_penalty = 1

screen_resolution = RES_640X480
screen_format = RGB24
render_hud = true
render_crosshair = false
render_weapon = true
render_decals = false
render_particles = false

# BUFFER per rilevamento nemici
depth_buffer_enabled = true
labels_buffer_enabled = true

available_buttons = { TURN_LEFT TURN_RIGHT ATTACK }
available_game_variables = { HEALTH AMMO2 KILLCOUNT }

# Timeout alto: ~70 secondi a 30 FPS = 2100 tics
# L'episodio finisce per morte O timeout (per evitare loop infiniti)
episode_timeout = 2100
episode_start_time = 14

mode = PLAYER
